<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Drawing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="toolbar">
            <div class="tool-group">
                <button class="tool-btn" data-tool="select" title="Select (V)">
                    <svg viewBox="0 0 24 24"><path d="M7 2l12 11.2-5.8.5 3.3 7.3-2.2 1-3.2-7.4L7 18.5z"/></svg>
                </button>
                <select id="moveToLayerSelect" style="display:none;font-size:12px;padding:2px 4px;border-radius:4px;border:1px solid #444;background:#2a2a3a;color:#ccc;">
                    <option value="">Move to...</option>
                </select>
                <button class="action-btn" id="centerHorizontalBtn" title="Center Horizontal" style="display:none;">
                    <svg viewBox="0 0 5 5"><path d="M 4.5671631,2.1822957 H 3.7723796 V 1.5864665 L 2.977596,2.38125 3.7723796,3.1760335 V 2.5802043 H 4.5671631 Z M 2.5802043,0.19533691 H 2.1822957 V 1.3875122 h 0.3979086 z m 0,3.17965089 H 2.1822957 V 4.5671631 H 2.5802043 Z M 1.784904,2.38125 0.99012041,1.5864665 v 0.5958292 h -0.7947835 v 0.3979086 h 0.7947835 v 0.5958292 z"/></svg>
                </button>
                <button class="action-btn" id="centerVerticalBtn" title="Center Vertical" style="display:none;">
                    <svg viewBox="0 0 5 5"><path d="M 2.1822957 0.19533691 L 2.1822957 0.99012044 L 1.5864665 0.99012044 L 2.38125 1.784904 L 3.1760335 0.99012044 L 2.5802043 0.99012044 L 2.5802043 0.19533691 L 2.1822957 0.19533691 z M 0.19533691 2.1822957 L 0.19533691 2.5802043 L 1.3875122 2.5802043 L 1.3875122 2.1822957 L 0.19533691 2.1822957 z M 3.3749878 2.1822957 L 3.3749878 2.5802043 L 4.5671631 2.5802043 L 4.5671631 2.1822957 L 3.3749878 2.1822957 z M 2.38125 2.977596 L 1.5864665 3.7723796 L 2.1822957 3.7723796 L 2.1822957 4.5671631 L 2.5802043 4.5671631 L 2.5802043 3.7723796 L 3.1760335 3.7723796 L 2.38125 2.977596 z "></svg>
                </button>
                <button class="action-btn" id="deleteSelectedBtn" title="Delete (Del)" style="display:none;">
                    <svg viewBox="0 0 24 24" style="fill: #ef4444;"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>
            <div class="tool-group" id="pathEditControls" style="display:none;">
                <button class="action-btn" id="pathEditBtn" title="Edit Path (E)">
                    <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM5.92 19H2v-3.92L17.07 1.93l3.92 3.92L5.92 19z"/></svg>
                </button>
                <select id="pointTypeSelect" style="display:none;font-size:12px;padding:2px 4px;border-radius:4px;border:1px solid #444;background:#2a2a3a;color:#ccc;width:80px;">
                    <option value="corner">Corner</option>
                    <option value="smooth">Smooth</option>
                    <option value="symmetric">Symmetric</option>
                </select>
                <button class="action-btn" id="addPointBtn" title="Add Point">
                    <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                </button>
                <button class="action-btn" id="deletePointBtn" title="Delete Point">
                    <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>
            <div class="tool-group">
                <button class="tool-btn active" id="toolBrush" data-tool="brush" title="Brush (B)">
                    <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34a.9959.9959 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                </button>
                <button class="tool-btn" id="toolLine" data-tool="line" title="Line (L)">
                    <svg viewBox="0 0 24 24"><path d="M3.5 22l2-2 13-13-2-2-13 13-2 2zm17.07-17.07l-2.83-2.83-1.41 1.41 2.83 2.83 1.41-1.41z"/></svg>
                </button>
                <button class="tool-btn" id="toolRect" data-tool="rect" title="Rectangle (R)">
                    <svg viewBox="0 0 24 24"><path d="M3 3v18h18V3H3zm16 16H5V5h14v14z"/></svg>
                </button>
                <button class="tool-btn" id="toolCircle" data-tool="circle" title="Circle (C)">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                </button>
            </div>
            <div class="tool-group" id="sizeToolGroup">
                <label class="tool-label">Size</label>
                <input type="range" id="brushSize" min="1" max="100" value="10">
                <input type="number" id="brushSizeValue" class="spinbox" min="1" max="100" value="10">
            </div>
            <div class="tool-group" id="expandToolGroup" style="display:none;">
                <label class="tool-label">Expand</label>
                <input type="range" id="expandOffset" min="0" max="20" value="2" step="0.5">
                <input type="number" id="expandOffsetValue" class="spinbox" min="0" max="20" value="2" step="0.5">
            </div>
            <div class="tool-group">
                <label class="tool-label">Opacity</label>
                <input type="range" id="brushOpacity" min="1" max="100" value="100">
                <input type="number" id="brushOpacityValue" class="spinbox" min="1" max="100" value="100" style="width:48px;text-align:right;">
            </div>

            <div class="tool-group">
                <label class="tool-label">Color</label>
                <input type="color" id="colorPicker" value="#000000">
                <button class="tool-btn" id="toolFill" data-tool="fill" title="Fill (F)">
                    <svg viewBox="0 0 24 24"><path d="M16.56 8.94L7.62 0 6.21 1.41l2.38 2.38-5.15 5.15c-.59.59-.59 1.54 0 2.12l5.5 5.5c.29.29.68.44 1.06.44s.77-.15 1.06-.44l5.5-5.5c.59-.58.59-1.53 0-2.12zM5.21 10L10 5.21 14.79 10H5.21zM19 11.5s-2 2.17-2 3.5c0 1.1.9 2 2 2s2-.9 2-2c0-1.33-2-3.5-2-3.5z"/></svg>
                </button>
            </div>
            <div class="tool-group">
                <button class="action-btn" id="undoBtn" title="Undo (Ctrl+Z)">
                    <svg viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z"/></svg>
                </button>
                <button class="action-btn" id="redoBtn" title="Redo (Ctrl+Y)">
                    <svg viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"/></svg>
                </button>
            </div>
            <div class="tool-group">
                <button class="action-btn" id="openBtn" title="Open SVG">
                    <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
                </button>
                <button class="action-btn" id="exportSVGBtn" title="Export SVG">
                    <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                </button>
                <button class="action-btn" id="exportPNGBtn" title="Export PNG">
                    <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                </button>
            </div>
        </header>

        <div class="main-content">
            <div class="canvas-container" id="canvasContainer">
                <canvas id="viewportCanvas"></canvas>
            </div>

                <div class="layer-opacity">
                    <label>Layer Opacity</label>
                    <input type="range" id="layerOpacity" min="0" max="100" value="100">
                    <input type="number" id="layerOpacityValue" class="spinbox" min="0" max="100" value="100">
                </div>
                <div class="layer-blend">
                    <label>Blend Mode</label>
                    <select id="layerBlendMode">
                        <option value="source-over">Normal</option>
                        <option value="multiply">Multiply</option>
                        <option value="screen">Screen</option>
                        <option value="overlay">Overlay</option>
                        <option value="darken">Darken</option>
                        <option value="lighten">Lighten</option>
                        <option value="color-dodge">Color Dodge</option>
                        <option value="color-burn">Color Burn</option>
                        <option value="hard-light">Hard Light</option>
                        <option value="soft-light">Soft Light</option>
                        <option value="difference">Difference</option>
                        <option value="exclusion">Exclusion</option>
                        <option value="hue">Hue</option>
                        <option value="saturation">Saturation</option>
                        <option value="color">Color</option>
                        <option value="luminosity">Luminosity</option>
                    </select>
                </div>
                <div class="layer-list" id="layerList"></div>
                <div class="layer-opacity" style="margin-top:8px;">
                    <label>Zoom</label>
                    <div style="display:flex;align-items:center;gap:4px;">
                        <input type="range" id="zoomSlider" min="100" max="5000" value="100" style="flex:1;">
                        <input type="number" id="zoomValue" class="spinbox" min="100" max="5000" value="100" style="width:48px;">
                        <button class="layer-btn" id="resetZoomBtn" title="Reset Zoom (Ctrl+0)" style="width:24px;height:24px;font-size:12px;">1:1</button>
                    </div>
                </div>
            </aside>
        </div>

    <input type="file" id="svgFileInput" accept=".svg" style="display:none">
