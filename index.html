                </div>
                <div class="layer-opacity">
                    <label>Layer Opacity</label>
                    <input type="range" id="layerOpacity" min="0" max="100" value="100">
                    <input type="number" id="layerOpacityValue" class="spinbox" min="0" max="100" value="100">
                </div>
                <div class="layer-blend">
                    <label>Blend Mode</label>
                    <select id="layerBlendMode">
                        <option value="source-over">Normal</option>
                        <option value="multiply">Multiply</option>
                        <option value="screen">Screen</option>
                        <option value="overlay">Overlay</option>
                        <option value="darken">Darken</option>
                        <option value="lighten">Lighten</option>
                        <option value="color-dodge">Color Dodge</option>
                        <option value="color-burn">Color Burn</option>
                        <option value="hard-light">Hard Light</option>
                        <option value="soft-light">Soft Light</option>
                        <option value="difference">Difference</option>
                        <option value="exclusion">Exclusion</option>
                        <option value="hue">Hue</option>
                        <option value="saturation">Saturation</option>
                        <option value="color">Color</option>
                        <option value="luminosity">Luminosity</option>
                    </select>
                </div>
                <div class="layer-list" id="layerList"></div>
                <div class="layer-opacity" style="margin-top:8px;">
                    <label>Zoom</label>
                    <div style="display:flex;align-items:center;gap:4px;">
                        <input type="range" id="zoomSlider" min="100" max="5000" value="100" style="flex:1;">
                        <input type="number" id="zoomValue" class="spinbox" min="100" max="5000" value="100" style="width:48px;">
                        <button class="layer-btn" id="resetZoomBtn" title="Reset Zoom (Ctrl+0)" style="width:24px;height:24px;font-size:12px;">1:1</button>
                    </div>
                </div>
                <div class="layer-opacity" style="margin-top:8px;">
                    <label>Rotate</label>
                    <div style="display:flex;align-items:center;gap:4px;">
                        <input type="range" id="RotateSlider" min="-180" max="180" value="0" style="flex:1;">
                        <input type="number" id="RotateValue" class="spinbox" min="-180" max="180" value="0" style="width:48px;">
                        <button class="layer-btn" id="resetRotationBtn" title="Reset Zoom (Ctrl+Shift+[)" style="width:24px;height:24px;font-size:12px;">0</button>
                    </div>
                </div>

                <div class="fill-controls" id="fillControls" style="margin-top:8px;display:none;">
                    <label>Fill Type</label>
                    <select id="fillTypeSelect" style="width:100%;padding:4px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:4px;color:var(--text-primary);font-size:11px;">
                        <option value="solid">Solid</option>
                        <option value="linear">Linear Gradient</option>
                        <option value="radial">Radial Gradient</option>
                    </select>

                    <div id="gradientEditor" style="display:none;margin-top:6px;">
                        <label>Preview</label>
                        <canvas id="gradientPreview" width="200" height="20" style="width:100%;height:20px;border-radius:4px;border:1px solid var(--border);"></canvas>

                        <div id="gradientStops" style="margin-top:4px;"></div>

                        <div style="display:flex;gap:4px;margin-top:4px;">
                            <button class="layer-btn" id="addStopBtn" title="Add Stop" style="width:24px;height:24px;">+</button>
                            <button class="layer-btn" id="removeStopBtn" title="Remove Stop" style="width:24px;height:24px;">-</button>
                        </div>

                        <div id="linearControls" style="display:none;margin-top:6px;">
                            <label>Angle</label>
                            <div style="display:flex;align-items:center;gap:4px;">
                                <input type="range" id="gradientAngle" min="0" max="360" value="0" style="flex:1;">
                                <input type="number" id="gradientAngleValue" class="spinbox" min="0" max="360" value="0" style="width:48px;">
                            </div>
                        </div>

                        <div id="radialControls" style="display:none;margin-top:6px;">
                            <label>Center X</label>
                            <div style="display:flex;align-items:center;gap:4px;">
                                <input type="range" id="gradientCx" min="0" max="100" value="50" style="flex:1;">
                                <input type="number" id="gradientCxValue" class="spinbox" min="0" max="100" value="50" style="width:48px;">
                            </div>
                            <label>Center Y</label>
                            <div style="display:flex;align-items:center;gap:4px;">
                                <input type="range" id="gradientCy" min="0" max="100" value="50" style="flex:1;">
                                <input type="number" id="gradientCyValue" class="spinbox" min="0" max="100" value="50" style="width:48px;">
                            </div>
                            <label>Radius</label>
                            <div style="display:flex;align-items:center;gap:4px;">
                                <input type="range" id="gradientR" min="0" max="100" value="50" style="flex:1;">
                                <input type="number" id="gradientRValue" class="spinbox" min="0" max="100" value="50" style="width:48px;">
                            </div>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <input type="file" id="svgFileInput" accept=".svg" style="display:none">
    <input type="file" id="imageFileInput" accept="image/*" style="display:none">

    <script src="lib/polybool.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
